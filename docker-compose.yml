version: '3.8'

services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: videohub-sql-server
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    networks:
      - videohub-network

  backend:
    build: ./backend
    container_name: videohub-backend
    ports:
      - "5000:80"
    depends_on:
      - sql-server
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server;Database=VideoHub;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: "Development"
      Jwt__Key: "your_secure_key_32_chars_long"
      Jwt__Issuer: "https://localhost:5000"
      Jwt__Audience: "https://localhost:3000"
      Mux__TokenId: "YOUR_MUX_TOKEN_ID"
      Mux__TokenSecret: "YOUR_MUX_TOKEN_SECRET"
      Stripe__SecretKey: "sk_test_..."
      Stripe__WebhookSecret: "whsec_..."
      Google__ClientId: "YOUR_GOOGLE_CLIENT_ID"
      Google__ClientSecret: "YOUR_GOOGLE_CLIENT_SECRET"
    networks:
      - videohub-network

  frontend:
    build: ./frontend
    container_name: videohub-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NUXT_PUBLIC_API_BASE_URL: "http://localhost:5000"
      NUXT_PUBLIC_STRIPE_PUBLIC_KEY: "pk_test_..."
    networks:
      - videohub-network

networks:
  videohub-network:
    driver: bridge

volumes:
  sql-data:
